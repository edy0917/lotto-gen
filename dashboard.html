<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luckyty 로또 분석 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family:'Segoe UI',sans-serif;
  margin:0;
  background:#f4f6f9;
}

/* ===== HEADER ===== */
.header{
  background:#1976d2;
  color:white;
  padding:16px;
  text-align:center;
  font-size:18px;
  font-weight:bold;
  box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

/* ===== LAYOUT ===== */
.container{
  padding:15px;
  max-width:1200px;
  margin:auto;
}

.dashboard{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:15px;
}

/* ===== CARD ===== */
.card{
  background:white;
  padding:18px;
  border-radius:14px;
  box-shadow:0 3px 12px rgba(0,0,0,0.08);
}

.card h2{
  margin-top:0;
  font-size:16px;
}

.rank-list{
  padding-left:15px;
}

.rank-list li{
  margin:6px 0;
  font-weight:600;
}

.highlight{color:#e74c3c;}
.hot{color:#e74c3c;font-weight:bold;}
.cold{color:#3498db;font-weight:bold;}

/* ===== CHART FIX ===== */
.chart-wrapper{
  position:relative;
  height:300px;
}

/* 하단 네비 */
.bottom-nav{
    position:fixed;
    bottom:0;
    width:100%;
    height:65px;
    background:white;
    display:flex;
    justify-content:space-around;
    align-items:center;
    box-shadow:0 -2px 8px rgba(0,0,0,0.1);
}

.bottom-nav a{
    text-decoration:none;
    color:#555;
    font-size:12px;
    text-align:center;
}

.bottom-nav a.active{
    color:#6200ea;
    font-weight:500;
}
/* ===== MOBILE ===== */
@media(max-width:600px){
  .dashboard{
    grid-template-columns:1fr;
  }
  .card h2{
    font-size:14px;
  }
  .header{
    font-size:16px;
  }
}
</style>
</head>
<body>

<div class="header">🎯 Luckyty 로또 분석 대시보드</div>

<div class="container">

<div class="dashboard">

<div class="card">
<h2>📊 전체 번호 출현 통계</h2>
<div class="chart-wrapper">
<canvas id="allChart"></canvas>
</div>
</div>

<div class="card">
<h2>🏆 TOP10 번호</h2>
<ul id="top10" class="rank-list"></ul>
</div>

<div class="card">
<h2>🔥 핫 번호 (최근100회)</h2>
<div id="hotNumbers"></div>
<h2 style="margin-top:15px;">❄ 콜드 번호 (최근100회)</h2>
<div id="coldNumbers"></div>
</div>

<div class="card">
<h2>📉 최근100회 추세</h2>
<div class="chart-wrapper">
<canvas id="trendChart"></canvas>
</div>
</div>

<div class="card">
<h2>⏳ 가장 오래 안 나온 번호</h2>
<ul id="overdue" class="rank-list"></ul>
</div>

<div class="card">
<h2>📊 번호 구간 분포</h2>
<div class="chart-wrapper">
<canvas id="rangeDist"></canvas>
</div>
</div>

<div class="card" style="margin: 0 0 70px 0;">
<h2>🎁 보너스 번호 TOP5</h2>
<ul id="bonusTop" class="rank-list"></ul>
</div>

</div>
</div>
<div class="bottom-nav">
    <a href="index.html">🏠 생성</a>
    <a href="winning.html">🏆 당첨</a>
    <a href="statistics.html">📊 통계</a>
    <a href="aisgst.html">🤖 AI</a>
    <a href="dashboard.html" class="active">📈 대시보드</a>
</div>

<script>

let lottoData=[];
const chartStore={};

async function loadLotto(){
    const res=await fetch("./lotto_data.json");
    lottoData=await res.json();
    render();
}

function initCount(){
    let obj={};
    for(let i=1;i<=45;i++) obj[i]=0;
    return obj;
}

function calculateFrequency(data){
    let count=initCount();
    data.forEach(d=>{
        d.numbers.forEach(n=>count[n]++);
    });
    return count;
}

function calculateBonusFrequency(data){
    let count=initCount();
    data.forEach(d=>{
        count[d.bonus]++;
    });
    return count;
}

function sortDesc(obj){
    return Object.entries(obj).sort((a,b)=>b[1]-a[1]);
}

function destroyChart(id){
    if(chartStore[id]) chartStore[id].destroy();
}

function render(){

    const totalFreq=calculateFrequency(lottoData);
    const sorted=sortDesc(totalFreq);

    renderBarChart(totalFreq);
    renderTop10(sorted);
    renderHotCold();
    renderTrend();
    renderOverdue();
    renderRangeDist(totalFreq);
    renderBonus();
}

function renderBarChart(freq){
    destroyChart("allChart");

    chartStore["allChart"]=new Chart(document.getElementById("allChart"),{
        type:'bar',
        data:{
            labels:Object.keys(freq),
            datasets:[{
                data:Object.values(freq),
                backgroundColor:"#1976d2"
            }]
        },
        options:{responsive:true,maintainAspectRatio:false}
    });
}

function renderTop10(sorted){
    const ul=document.getElementById("top10");
    ul.innerHTML="";
    sorted.slice(0,10).forEach((item,i)=>{
        ul.innerHTML+=`<li class="${i<3?'highlight':''}">${i+1}위 - ${item[0]}번 (${item[1]}회)</li>`;
    });
}

function renderHotCold(){
    const recent=lottoData.slice(-100);
    const freq=calculateFrequency(recent);
    const sorted=sortDesc(freq);

    document.getElementById("hotNumbers").innerHTML=
        sorted.slice(0,5).map(x=>`<span class="hot">${x[0]} </span>`).join("");

    document.getElementById("coldNumbers").innerHTML=
        sorted.slice(-5).map(x=>`<span class="cold">${x[0]} </span>`).join("");
}

function renderTrend(){
    destroyChart("trendChart");

    const recent=lottoData.slice(-100);
    const freq=calculateFrequency(recent);

    chartStore["trendChart"]=new Chart(document.getElementById("trendChart"),{
        type:'line',
        data:{
            labels:Object.keys(freq),
            datasets:[{
                data:Object.values(freq),
                borderColor:"#6c5ce7",
                tension:0.3
            }]
        },
        options:{responsive:true,maintainAspectRatio:false}
    });
}

    lottoData.forEach((draw,i)=>{
        draw.numbers.forEach(n=>{

}*/
function renderOverdue(){

    let result=[];

    for(let num=1; num<=45; num++){

        let miss=0;

        for(let i=0;i<lottoData.length;i++){
            if(lottoData[i].numbers.includes(num)) break;
            miss++;
        }

        result.push([num,miss]);
    }

    result.sort((a,b)=>b[1]-a[1]);

    const ul=document.getElementById("overdue");
    ul.innerHTML="";

    result.slice(0,5).forEach(item=>{
        ul.innerHTML+=`<li>${item[0]}번 - ${item[1]}회 미출현</li>`;
    });
}

function renderRangeDist(freq){
    destroyChart("rangeDist");

    let ranges={"1~10":0,"11~20":0,"21~30":0,"31~40":0,"41~45":0};

    for(let num in freq){
        let n=parseInt(num);
        if(n<=10) ranges["1~10"]+=freq[num];
        else if(n<=20) ranges["11~20"]+=freq[num];
        else if(n<=30) ranges["21~30"]+=freq[num];
        else if(n<=40) ranges["31~40"]+=freq[num];
        else ranges["41~45"]+=freq[num];
    }

    chartStore["rangeDist"]=new Chart(document.getElementById("rangeDist"),{
        type:'doughnut',
        data:{labels:Object.keys(ranges),
              datasets:[{data:Object.values(ranges)}]},
        options:{responsive:true,maintainAspectRatio:false}
    });
}

function renderBonus(){
    const freq=calculateBonusFrequency(lottoData);
    const sorted=sortDesc(freq);

    const ul=document.getElementById("bonusTop");
    ul.innerHTML="";
    sorted.slice(0,5).forEach((item,i)=>{
        ul.innerHTML+=`<li>${i+1}위 - ${item[0]}번 (${item[1]}회)</li>`;
    });
}

loadLotto();

</script>
</body>
</html>
